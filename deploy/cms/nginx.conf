limit_req_zone $isso_limit zone=isso:10m rate=5r/s;

# Only rate-limit write requests (POST, PUT, DELETE)
map $request_method $isso_limit {
	GET "";
	HEAD "";
	default $binary_remote_addr;
}

server {
	listen 80;
	listen [::]:80;
	server_name neurau.eu www.neurau.eu;

	location /.well-known/acme-challenge/ {
		root /var/www/acme;
	}
	location / {
		return 301 https://neurau.eu$request_uri;
	}
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name www.neurau.eu;

	ssl_certificate /etc/letsencrypt/live/neurau.eu/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/neurau.eu/privkey.pem;

	return 301 https://neurau.eu$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name neurau.eu;

	ssl_certificate /etc/letsencrypt/live/neurau.eu/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/neurau.eu/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;

	root /var/www/neurau.eu/public;
	index index.html;

	location /admin/config.yml {
		types { text/yaml yml; }
	}

	location / {
		try_files $uri $uri/ =404;
	}

	location /oauth/ {
		proxy_pass http://127.0.0.1:8090;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
	}

	location = /webhook {
		proxy_pass http://127.0.0.1:8090;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
	}

	location /.comments/ {
		limit_req zone=isso burst=10 nodelay;
		proxy_pass http://127.0.0.1:8080/;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Script-Name /.comments;
	}
}
