limit_req_zone $isso_limit zone=isso:10m rate=5r/s;

# Only rate-limit write requests (POST, PUT, DELETE)
map $request_method $isso_limit {
	GET "";
	HEAD "";
	default $binary_remote_addr;
}

server {
	listen 80;
	listen [::]:80;
	server_name comments.neurau.eu;

	location /.well-known/acme-challenge/ {
		root /var/www/acme;
	}
	location / {
		return 301 https://$host$request_uri;
	}
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name comments.neurau.eu;

	ssl_certificate /etc/letsencrypt/live/comments.neurau.eu/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/comments.neurau.eu/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;

	# Strip CORS headers from Isso to avoid duplicates
	proxy_hide_header Access-Control-Allow-Origin;
	proxy_hide_header Access-Control-Allow-Methods;
	proxy_hide_header Access-Control-Allow-Headers;
	proxy_hide_header Access-Control-Allow-Credentials;
	proxy_hide_header Access-Control-Expose-Headers;

	add_header Access-Control-Allow-Origin "https://neurau.eu" always;
	add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
	add_header Access-Control-Allow-Headers "Content-Type" always;
	add_header Access-Control-Allow-Credentials "true" always;
	add_header Access-Control-Expose-Headers "Date, X-Set-Cookie" always;
	add_header X-Content-Type-Options "nosniff" always;

	# Static assets (JS/CSS) served without origin check
	location /js/ {
		proxy_pass http://127.0.0.1:8080;
		proxy_set_header Host $host;
	}

	# API: block requests not coming from neurau.eu
	location / {
		set $cors_ok 0;
		if ($http_origin = "https://neurau.eu") { set $cors_ok 1; }
		if ($request_method = OPTIONS) { set $cors_ok 1; }
		if ($cors_ok = 0) { return 403; }

		limit_req zone=isso burst=10 nodelay;
		proxy_pass http://127.0.0.1:8080;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
