server {
	listen 80;
	listen [::]:80;
	server_name comments.neurau.eu;

	location /.well-known/acme-challenge/ {
		root /var/www/acme;
	}
	location / {
		return 301 https://$host$request_uri;
	}
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name comments.neurau.eu;

	ssl_certificate /etc/letsencrypt/live/comments.neurau.eu/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/comments.neurau.eu/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;

	# Only allow requests from neurau.eu
	set $cors_ok 0;
	if ($http_origin = "https://neurau.eu") { set $cors_ok 1; }
	if ($cors_ok = 0) { return 403; }

	add_header Access-Control-Allow-Origin "https://neurau.eu" always;
	add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
	add_header Access-Control-Allow-Headers "Content-Type" always;
	add_header X-Content-Type-Options "nosniff" always;

	if ($request_method = OPTIONS) {
		return 204;
	}

	location / {
		limit_req zone=isso burst=10 nodelay;
		proxy_pass http://127.0.0.1:8080;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
