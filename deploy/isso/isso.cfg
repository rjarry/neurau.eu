[general]
dbpath = /db/comments.db
host = https://neurau.eu
notify = smtp
log-file = /dev/stdout

[moderation]
enabled = true

[guard]
enabled = true
ratelimit = 2
direct-reply = 3
reply-to-self = false
require-email = false

[markup]
options = strikethrough, autolink
allowed-elements =
allowed-attributes =

[smtp]
host = $SMTP_HOST
port = $SMTP_PORT
security = ssl
to = $SMTP_TO
from = $SMTP_FROM
username = $SMTP_USERNAME
password = $SMTP_PASSWORD
